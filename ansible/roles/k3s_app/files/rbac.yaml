apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kube-latency-map
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-latency-map
  namespace: default
subjects:
  - kind: ServiceAccount
    name: kube-latency-map
    namespace: default
roleRef:
  kind: Role
  name: kube-latency-map
  apiGroup: rbac.authorization.k8s.io