apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-latency-map
  namespace: default
  labels:
    app: kube-latency-map
spec:
  selector:
    matchLabels:
      app: kube-latency-map
  template:
    metadata:
      labels:
        app: kube-latency-map
    spec:
      serviceAccountName: kube-latency-map
      containers:
        - name: kube-latency-map
          image: eb613819/kube-latency-map:1.0.0
          ports:
            - containerPort: 3000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kube-latency-map
  namespace: default
spec:
  selector:
    app: kube-latency-map
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080